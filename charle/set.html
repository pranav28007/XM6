
<!DOCTYPE html>
<html>
<head>
    <title>Number to Words</title>
    <script>
        function convert() {
            var num = document.getElementById("num").value;

            if (isNaN(num)) {
                document.getElementById("result").value = "Not a number";
                return;
            }

            num = parseInt(num);

            if (num < 0 || num > 999) {
                document.getElementById("result").value = "Out of range";
                return;
            }

            var ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine"];
            var teens = ["Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen",
                         "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
            var tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty",
                        "Sixty", "Seventy", "Eighty", "Ninety"];

            var word = "";

            if (num >= 100) {
                word += ones[Math.floor(num / 100)] + " Hundred ";
                num = num % 100;
            }

            if (num >= 10 && num <= 19) {
                word += teens[num - 10];
            } else {
                word += tens[Math.floor(num / 10)] + " ";
                word += ones[num % 10];
            }

            document.getElementById("result").value = word.trim();
        }
    </script>
</head>

<body>
    <h2>Number to Words</h2>

    Enter Number:
    <input type="text" id="num"><br><br>

    Result:
    <input type="text" id="result" readonly><br><br>

    <button onclick="convert()">Convert</button>
</body>
</html>
